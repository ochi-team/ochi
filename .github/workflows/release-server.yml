name: Release Server

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and Publish Server Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate tag format
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid server tag format: $TAG"
            echo "Expected format: v<major>.<minor>.<patch>"
            exit 1
          fi

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Test ochi
        run: zig build test

      - name: Build release binary
        run: zig build -Doptimize=ReleaseSafe -Drelease=true

      - name: Package artifacts
        run: |
          mkdir -p dist
          cp zig-out/bin/ochi dist/ochi
          chmod +x dist/ochi
          tar -czf "dist/ochi-${GITHUB_REF_NAME}-linux-x86_64.tar.gz" -C dist ochi
          shasum -a 256 "dist/ochi-${GITHUB_REF_NAME}-linux-x86_64.tar.gz" > "dist/ochi-${GITHUB_REF_NAME}-linux-x86_64.tar.gz.sha256"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ochi ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/ochi-${{ github.ref_name }}-linux-x86_64.tar.gz
            dist/ochi-${{ github.ref_name }}-linux-x86_64.tar.gz.sha256

