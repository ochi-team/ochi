data_dir: .vector

sources:
  in:
    type: stdin

transforms:
  parse:
    type: remap
    inputs: [in]
    source: |-
      .metadata = {}
      parsed, err = parse_logfmt(.message)
      if err == null {
        msg, msg_err = string(parsed.msg)
        if msg_err == null {
          metadata = {}
          for_each(object(parsed)) -> |key, value| {
            if key == "@ts" || key == "_ts" {
              ts, ts_err = parse_timestamp(string(value) ?? encode_json(value), format: "%+")
              if ts_err == null {
                .timestamp = ts
              }
            } else if key != "msg" {
              metadata_key = key
              if key == "@l" || key == "_l" {
                metadata_key = "lvl"
              }
              metadata = set!(metadata, [metadata_key], string(value) ?? encode_json(value))
            }
          }
          .message = msg
          .metadata = metadata
        }
      }

sinks:
  loki:
    type: loki
    inputs: [parse]
    endpoint: http://localhost:9014
    path: /ingest/loki/api/v1/push
    compression: none
    healthcheck:
      enabled: false
    structured_metadata:
      '*': "{{ metadata }}"
    encoding:
      codec: text
    labels:
      job: "local"
